<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Jeremiah Thomas</title>
        <div class="header">
            <h1>Jeremiah Thomas</h1>
        </div>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <!--scroll to top button-->
        <div style="position: fixed; bottom: 70px; right: 25px; z-index: 900">
            <a href="#top">
                <img class=" lazyloaded" src="https://imthemoisturizer.com/wp-content/uploads/2022/04/Top.svg" data-src="https://imthemoisturizer.com/wp-content/uploads/2022/04/Top.svg" alt="Boton subir" width="40" height="40">
            </a>
        </div>
        <!--scroll to bottom button-->
        <div style="position: fixed; bottom: 25px; right: 25px; z-index: 900">
            <a href="#music_page">
                <img class=" lazyloaded" src="https://imthemoisturizer.com/wp-content/uploads/2022/04/Bottom.svg" data-src="https://imthemoisturizer.com/wp-content/uploads/2022/04/Bottom.svg" alt="Boton bajada" width="40" height="40">
        </div>


        <script src="script.js"></script>

        <!--scroll down onclick from top-->
        <div id="from-top-scroll">
            <ul>
                <li><a href="#programming_page"><icon>Programming Page</icon></a></li>
                <li><a href="#graphic_design_page"><icon>Graphic Design</icon></a></li>
                <li><a href="#music_page"><icon>Music</icon></a></li>
            </ul>
        </div>

        <!--scroll down onclick from side-->
        <div id="from-left-scroll">
            <ul>
                <li><a href="#programming_page">Programming</a></li>
                <li><a href="#graphic_design_page">Graphic Design</a></li>
                <li><a href="#electrical_page">Electrical</a></li>
                <li><a href="#music_page">Music</a></li>

            </ul>
        </div>
        
        <!--pages-->
        <div id="container">
            <div id="programming_page">
                IN PROGRESS
                <!-- Slideshow container -->
                <div class="slideshow-container">

                    <!-- Full-width images with number and caption text -->
                    <div class="mySlides fade">
                    <div class="numbertext">1 / 3</div>
                    <img src="progamming_thumbnails/img1.jpg" style="width:100%">
                    <div class="text">Strx</div>
                    </div>
                
                    <div class="mySlides fade">
                    <div class="numbertext">2 / 3</div>
                    <img src="progamming_thumbnails/img2.jpg" style="width:100%">
                    <div class="text">
                        Caption Two
                    </div>
                    </div>
                
                    <div class="mySlides fade">
                    <div class="numbertext">3 / 3</div>
                    <img src="progamming_thumbnails/img3.jpg" style="width:100%">
                    <div class="text">
                        Caption Three
                    </div>
                    </div>
                
                    <!-- Next and previous buttons -->
                    <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
                    <a class="next" onclick="plusSlides(1)">&#10095;</a>
                </div>
                <br>
                
                <!-- The dots/circles -->
                <div style="text-align:center">
                    <span class="dot" onclick="currentSlide(1)"></span>
                    <span class="dot" onclick="currentSlide(2)"></span>
                    <span class="dot" onclick="currentSlide(3)"></span>
                </div>
            </div>

            <div id="graphic_design_page"></div>
            <div id="electrical_page">
                COMING SOON
            </div>
            <div id="music_page">
                <a target="_blank" rel="noopener noreferrer" href="https://on.soundcloud.com/VX6gRqb77ZZL38YK7">
                    Soundcloud
                </a>
            </div>
        </div>
    </body>
</html>
